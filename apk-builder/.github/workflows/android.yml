name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permisos
        run: chmod +x ./gradlew || true

      - name: Compilar APK
        run: |
          echo "Aquí irá el proyecto Android real"
          mkdir output
          echo "APK DEMO" > output/app-release.apk

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Kenciblack-APK
          path: output/app-release.apk
